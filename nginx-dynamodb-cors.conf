server {
    listen 80;
    server_name localhost;

    # DynamoDB Localへのプロキシ
    location / {
        # プリフライトリクエスト（OPTIONS）の処理
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Amz-Target,X-Amz-Date,X-Amz-Security-Token,X-Amz-Content-Sha256,amz-sdk-invocation-id,amz-sdk-request' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        # CORSヘッダーを追加
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Amz-Target,X-Amz-Date,X-Amz-Security-Token,X-Amz-Content-Sha256,amz-sdk-invocation-id,amz-sdk-request' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,X-Amzn-RequestId,x-amzn-ErrorType' always;

        # DynamoDB Localにプロキシ
        proxy_pass http://dynamodb:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
